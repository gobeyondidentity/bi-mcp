name: Publish

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to create GitHub Release
      id-token: write       # needed for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for the main-ancestry check
      - name: Refuse tags that aren't on main
        # Only commits already on main can be published. Stops accidental
        # tagging of feature branches and unmerged work. This is the
        # primary gate on WHAT gets published. Restricting WHO can push
        # v*.*.* tags is an optional tightening — add a tag-protection
        # rule in repo settings if the team grows beyond a small trusted
        # group.
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} points at ${{ github.sha }}, which is not on main. Refusing to publish."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      # `prepublishOnly` would re-run build+lint+test; --ignore-scripts
      # avoids the redundant work since the steps above already ran them.
      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
